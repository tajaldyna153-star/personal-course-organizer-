    <main>
        <section>
            <h1>Add New Course</h1>

        <section>
          <form method="post">
            <label for="cor">Course Name</label>
            <input placeholder="write a name course...." maxlength="20" minlength="1" required id="cor" type="text"></input> 
            <br><br> 

            <label for="ins">Instructor Name</label>
            <input placeholder="write a name professor...." required id="ins" type="text">
            </input> 
            <br><br> 

            <label for="hor">Hours</label> 
            <input placeholder="Number of credits hours...." required id="hor" type="number"></input> 
            <br><br> 
            <label for="not">Notes</label> 
            <textarea placeholder="write description...." maxlength="100" minlength="10" cols="30" rows="3" required  id="not"></textarea>
            <br><br> 
            <button type="submit">click 
            </button> 
          </form>
